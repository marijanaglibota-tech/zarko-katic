<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Nikola Tesla</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 15px 20px;
            font-size: 16px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Slika Nikole Tesle -->
        <img src="tesla.jpg" alt="Nikola Tesla">

        <!-- Gumbi -->
        <div class="buttons">
            <button>Tko je bio Nikola Tesla?</button>
            <button>Doprinosi i izumi</button>
            <button>Životopis</button>
            <button>Starost i smrt</button>
            <button>Slike</button>
        </div>

    </div>

</body>
</html>
