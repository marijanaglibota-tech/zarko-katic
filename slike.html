<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Slike Nikole Tesle</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin: 30px 0 20px 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: 0 auto 30px auto;
            padding: 0 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 8px;
        }

        button {
            margin-bottom: 30px;
            padding: 12px 20px;
            font-size: 16px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <h1>Slike Nikole Tesle</h1>

    <div class="gallery">
        <img src="tesla1.jpg" alt="Nikola Tesla 1">
        <img src="tesla2.jpg" alt="Nikola Tesla 2">
        <img src="tesla3.jpg" alt="Nikola Tesla 3">
        <img src="tesla4.jpg" alt="Nikola Tesla 4">
        <img src="tesla5.jpg" alt="Nikola Tesla 5">
        <img src="tesla6.jpg" alt="Nikola Tesla 6">
        <img src="tesla7.jpg" alt="Nikola Tesla 7">
        <img src="tesla8.jpg" alt="Nikola Tesla 8">
        <img src="tesla9.jpg" alt="Nikola Tesla 9">
        <img src="tesla10.jpg" alt="Nikola Tesla 10">
        <img src="tesla11.jpg" alt="Nikola Tesla 11">
        <img src="tesla12.jpg" alt="Nikola Tesla 12">
        <img src="tesla13.jpg" alt="Nikola Tesla 13">
    </div>

    <a href="index.html">
        <button>Povratak na početnu stranicu</button>
    </a>

</body>
</html>
