<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Slike Nikole Tesle</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 30px auto;
        }

        .gallery img {
            width: 100%;
            border-radius: 8px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <h1>Slike Nikole Tesle</h1>

    <div class="gallery">
        <img src="tesla1.jpg" alt="Nikola Tesla 1">
        <img src="tesla2.jpg" alt="Nikola Tesla 2">
        <img src="tesla3.jpg" alt="Nikola Tesla 3">
        <img src="tesla4.jpg" alt="Nikola Tesla 4">
    </div>

    <a href="index.html">
        <button>Povratak na početnu stranicu</button>
    </a>

</body>
</html>
