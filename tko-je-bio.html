    <style>

            font-family: Arial, sans-serif;
            background-color: #ffffff;
            padding: 40px;
        }

        h1 {
            color: #1f3c88;

        }

        button {

            background-color: #2c3e50;

        }

<body>

    <h1>U što bi sad gledao bez njega?</h1>

    <p>
        Nikola Tesla bio je hrvatsko-američki izumitelj i inženjer hrvatskog
        podrijetla, koji je najpoznatiji po svojim doprinosima u dizajniranju
        suvremenog sustava distribucije električne energije koristeći se izmjeničnom
        strujom.
    </p>
